<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="truckGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cabine do caminhão -->
  <rect x="50" y="80" width="80" height="60" fill="url(#truckGradient)" rx="5"/>
  <rect x="55" y="85" width="30" height="25" fill="#3498db" opacity="0.7"/>
  <rect x="90" y="85" width="35" height="25" fill="#3498db" opacity="0.7"/>
  
  <!-- Carroceria -->
  <rect x="130" y="70" width="200" height="70" fill="#ecf0f1" stroke="#95a5a6" stroke-width="3"/>
  <line x1="180" y1="70" x2="180" y2="140" stroke="#95a5a6" stroke-width="2"/>
  <line x1="230" y1="70" x2="230" y2="140" stroke="#95a5a6" stroke-width="2"/>
  <line x1="280" y1="70" x2="280" y2="140" stroke="#95a5a6" stroke-width="2"/>
  
  <!-- Rodas -->
  <circle cx="90" cy="145" r="18" fill="#2c3e50"/>
  <circle cx="90" cy="145" r="12" fill="#7f8c8d"/>
  <circle cx="90" cy="145" r="6" fill="#bdc3c7"/>
  
  <circle cx="160" cy="145" r="18" fill="#2c3e50"/>
  <circle cx="160" cy="145" r="12" fill="#7f8c8d"/>
  <circle cx="160" cy="145" r="6" fill="#bdc3c7"/>
  
  <circle cx="290" cy="145" r="18" fill="#2c3e50"/>
  <circle cx="290" cy="145" r="12" fill="#7f8c8d"/>
  <circle cx="290" cy="145" r="6" fill="#bdc3c7"/>
  
  <!-- Estrela Mercedes -->
  <g transform="translate(85, 100)">
    <circle cx="0" cy="0" r="10" fill="white" stroke="#2c3e50" stroke-width="1"/>
    <path d="M 0,-8 L 0,8 M -7,-4 L 7,4 M -7,4 L 7,-4" stroke="#2c3e50" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Detalhes -->
  <rect x="45" y="140" width="10" height="5" fill="#e74c3c"/>
  <rect x="325" y="75" width="3" height="60" fill="#e74c3c"/>
</svg>
